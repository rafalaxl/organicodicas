<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz: Qual seu Nível de Vitalidade?</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.css">
  <script src="js/theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind-config.js"></script>
</head>
<body class="bg-primary text-primary font-body antialiased transition-colors duration-normal min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-[65ch]">
    <section id="quiz-container" class="p-6 md:p-8 bg-secondary rounded-xl shadow-lg border border-border w-full">
      <div id="quiz-header" class="mb-6">
        <div class="w-full bg-tertiary h-2 rounded-full overflow-hidden">
          <div id="quiz-progress" class="bg-accent h-full w-0 transition-all duration-normal"></div>
        </div>
        <p id="quiz-counter" class="text-sm text-muted mt-2 text-right">Carregando...</p>
      </div>
      <h3 id="quiz-question" class="font-heading text-2xl font-bold mb-6 text-primary leading-tight">Preparando análise...</h3>
      <div id="quiz-options" class="flex flex-col gap-3"></div>
    </section>
  </div>
  <script src="js/quiz.js"></script>
</body>
</html>
